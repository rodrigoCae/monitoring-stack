version: '3.8'

networks:
  staging_net:
    driver: bridge

volumes:
  local_prometheus_data:
  local_grafana_data:
  loki_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: staging_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sua_senha
      POSTGRES_DB: seu_banco
    ports:
      - "5432:5432"
    networks:
      - staging_net

  quarkus-app:
    build:
      context: app-stack/quarkus-api
      dockerfile: Dockerfile
    container_name: staging_quarkus
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://staging_postgres:5432/seu_banco"
    depends_on:
      - postgres
    networks:
      - staging_net

  nginx:
    image: nginx:alpine
    container_name: staging_nginx
    volumes:
      - ./app-stack/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - quarkus-app
    networks:
      - staging_net

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: staging_node_exporter
    networks:
      - staging_net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.0.0
    container_name: staging_nginx_exporter
    command: -nginx.scrape-uri=http://staging_nginx:80/nginx_status
    depends_on:
      - nginx
    networks:
      - staging_net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: staging_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:sua_senha@staging_postgres:5432/seu_banco?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - staging_net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: staging_promtail
    volumes:
      - ./app-stack/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - staging_net

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: staging_prometheus
    volumes:
      - ./monitoring-stack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring-stack/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - local_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - staging_net

  loki:
    image: grafana/loki:2.9.0
    container_name: staging_loki
    volumes:
      - ./monitoring-stack/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - staging_net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: staging_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - local_grafana_data:/var/lib/grafana
      - ./monitoring-stack/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - staging_net

  alertmanager:
    image: prom/alertmanager:v0.25.0
    container_name: staging_alertmanager
    volumes:
      - ./monitoring-stack/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - staging_net