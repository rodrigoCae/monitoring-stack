server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://staging_loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets: ['localhost']
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*-json.log
