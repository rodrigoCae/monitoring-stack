global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['staging_alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'linux-host'
    static_configs:
      - targets: ['staging_node_exporter:9100']

  - job_name: 'nginx'
    static_configs:
      - targets: ['staging_nginx_exporter:9113']

  - job_name: 'quarkus-app'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['staging_quarkus:8080']

  - job_name: 'postgresql'
    static_configs:
      - targets: ['staging_postgres_exporter:9187']
